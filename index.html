<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/index.css">
    <title>Pesquisa de Livro</title>
</head>
<body class="bg-[url('assets/Livraria.webp')] bg-cover flex justify-center items-center h-screen">
    <main class="bg-amber-700 p-10 rounded-3xl">
        <h1 class="text-white text-4xl font-bold">Pesquisa de Livro</h1>
        <section>
            <form class="flex flex-col items-end" onsubmit="fetchBook(event)">
                <input id="nome" name="" class="focus:outline-amber-500 focus:outline-2 bg-gray-700 rounded-md w-full p-1.5 mt-2 placeholder:text-gray-400 hover: text-white" type="text" aria-label="Nome" placeholder="Digite o nome de um livro">
                <button type="submit" class="bg-amber-500 mt-5 p-2 text-white rounded-md cursor-pointer hover:bg-amber-600">Pesquisar</button>
            </form>
        </section>
    </main>
    <script src="/index.js"></script>
</body>
</html>
